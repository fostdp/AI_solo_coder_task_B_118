global:
  scrape_interval: 15s
  evaluation_interval: 15s
  scrape_timeout: 10s
  external_labels:
    cluster: metallurgy-simulation
    environment: production

alerting:
  alertmanagers:
    - static_configs:
        - targets: []

rule_files:
  - "rules/*.yml"

scrape_configs:
  - job_name: "prometheus"
    static_configs:
      - targets: ["localhost:9090"]

  - job_name: "metallurgy-backend"
    metrics_path: /metrics
    scheme: http
    static_configs:
      - targets: ["backend:9090"]
        labels:
          service: metallurgy-backend
          component: rust-actor-system
    scrape_interval: 10s
    honor_labels: true

  - job_name: "clickhouse"
    static_configs:
      - targets: ["clickhouse:8123"]
    metrics_path: /metrics
    scrape_interval: 30s
